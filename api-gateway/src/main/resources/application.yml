server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 3600000 # 1 hour

spring:
  application:
    name: API-GATEWAY
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**
        - id: quantity-service
          uri: lb://QUANTITY-SERVICE
          predicates:
            - Path=/api/v1/quantities/**
          filters:
            - AuthenticationFilter
  
  # CORRECTED: Nested under spring
  boot:
    admin:
      client:
        url: ${ADMIN_SERVER_URL}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}
server:
  port: ${PORT:8081}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 3600000 # 1 hour

spring:
  application:
    name: AUTH-SERVICE


  # H2 Database
  datasource:
    url: jdbc:h2:mem:authservice
    driverClassName: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA Settings
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # OAuth2 & Security
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${REDIRECT_URI}
            scope:
              - email
              - profile

# Service Discovery (Eureka)
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}
  instance:
    prefer-ip-address: true

# Monitoring
management:
  endpoints:
    web:
      exposure:
        include: "*"   # expose all endpoints
  endpoint:
    health:
      show-details: always

  boot:
    admin:
      client:
        url: ${ADMIN_SERVER_URL}
        instance:
          prefer-ip: true
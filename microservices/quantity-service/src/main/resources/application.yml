server:
  port: ${PORT:8082}

spring:
  application:
    name: QUANTITY-SERVICE

  boot:
    admin:
      client:
        url: ${ADMIN_SERVER_URL}

  datasource:
    url: jdbc:h2:mem:quantityservice;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
# Add this to see the EXACT reason the web server fails
logging:
  level:
    org.springframework.web: DEBUG
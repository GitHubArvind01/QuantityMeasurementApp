server:
  port: 8082

spring:
  application:
    name: QUANTITY-SERVICE

  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/quantitydb
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
boot:
  admin:
    client:
      url: ${ADMIN_URL:http://localhost:9090}
      instance:
        prefer-ip: true